<!doctype html>
<html lang="ru">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RSS Агрегатор</title>
    <script type="module" src="./src/js/main.js"></script>
</head>
<body>
    <main class="wrapper">
        <header class="pb-3 mb-4">
            <div class="container">
                <div class="row">
                    <h1>RSS агрегатор</h1>
                    <p>Начните читать RSS уже сегодня</p>
                    <form id="rss-form">
                        <div class="mb-3">
                            <label for="rss-input" class="form-label" data-i18n="rssLabel">Ссылка RSS</label>
                            <input 
                                type="url" 
                                class="form-control" 
                                id="rss-input" 
                                name="rss"
                                placeholder="https://example.com/rss"
                                autofocus
                            >
                            <div id="rss-feedback" class="invalid-feedback"></div>
                        </div>
                        <button type="submit" id="rss-submit" class="btn btn-primary" data-i18n="addButton">Добавить</button>
                    </form>
                </div>
            </div>
        </header>

        <section>
            <div class="container">
                <div class="row">
                    <div id="feeds-container"></div>
                    <div id="posts-container"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container" id="app-footer">
            Created by me
        </div>
    </footer>

    <!-- Modal -->
    <div class="modal fade" id="post-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-description"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="closeButton">Закрыть</button>
                    <a href="#" id="modal-full-link" class="btn btn-primary" target="_blank" data-i18n="readFullButton">Читать полностью</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
